{% extends 'base.html' %}

{% block title %}Smazat akci | ZK4 Production{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="alert alert-danger text-center shadow-sm rounded-4">
            <h2 class="mb-3">Opravdu smazat akci "{{ gig.name }}"?</h2>
            <p class="mb-4">Tato akce je nevratná. Smaže se tím i veškerá napojená technika a odpracovaný čas!</p>
            <form method="post">
                {% csrf_token %}
                <a href="{% url 'gig_list' %}" class="btn btn-secondary rounded-pill px-4">Zrušit</a>
                <button type="submit" class="btn btn-danger rounded-pill px-4">Ano, nenávratně smazat</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
