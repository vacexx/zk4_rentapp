{% extends 'base.html' %}

{% block title %}Přidat techniku | ZK4 Production{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
            <h2 class="fw-bold mb-4">Přidat zapůjčenou techniku</h2>
            <h5 class="text-muted mb-4">Akce: {{ gig.name }}</h5>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-flex justify-content-between mt-4 pt-3 border-top text-end">
                    <a href="{% url 'gig_detail' gig.id %}" class="btn btn-outline-secondary rounded-pill px-4">Zrušit</a>
                    <button type="submit" class="btn btn-primary rounded-pill px-4 shadow-sm">Přidat techniku</button>
                </div>
            </form>
        </div>
    </div>
</div>
</div>
{% endblock %}
