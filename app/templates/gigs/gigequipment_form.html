<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seznam akcí | Zvukař App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width: 600px;">
    <h2 class="mb-4">Přidat zapůjčenou techniku</h2>
    <h5 class="text-muted mb-4">Akce: {{ gig.name }}</h5>
    <div class="card shadow-sm">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-flex justify-content-between mt-4">
                    <a href="{% url 'gig_detail' gig.id %}" class="btn btn-outline-secondary">Zrušit</a>
                    <button type="submit" class="btn btn-primary">Přidat techniku</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
