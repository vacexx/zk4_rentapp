<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Smazat akci</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width: 600px;">
    <div class="alert alert-danger text-center shadow-sm rounded-4">
        <h3 class="mb-4">Opravdu smazat fázi "{{ phase.get_phase_display }}"?</h3>
        <form method="post">
            {% csrf_token %}
            <a href="{% url 'gig_detail' phase.gig.id %}" class="btn btn-secondary rounded-pill px-4">Zrušit</a>
            <button type="submit" class="btn btn-danger rounded-pill px-4">Ano, smazat</button>
        </form>
    </div>
</div>
</body>
</html>
