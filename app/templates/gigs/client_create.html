{% extends 'base.html' %}

{% block title %}Nová akce | ZK4 Production{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-4">
                <h2 class="fw-bold mb-4"><i class="bi bi-person-plus-fill me-2"></i>Nový klient</h2>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    {{ form.as_p }}
                    
                    <div class="d-flex justify-content-between mt-4 pt-3 border-top text-end">
                        <a href="javascript:history.back()" class="btn btn-outline-secondary rounded-pill px-4">Zpět</a>
                        <button type="submit" class="btn btn-primary rounded-pill px-5 shadow-sm">Uložit klienta</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
