<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Přidat klienta | Zvukař App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .hover-lift { transition: transform 0.2s ease-in-out, box-shadow 0.2s; }
        .hover-lift:hover { transform: translateY(-3px); box-shadow: 0 .5rem 1rem rgba(0,0,0,.15)!important; }
        .note-text { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-light pb-5">

<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-5">
                <h2 class="fw-bold mb-4"><i class="bi bi-person-plus-fill me-2"></i>Nový klient</h2>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    {{ form.as_p }}
                    
                    <div class="mt-4 pt-3 border-top text-end">
                        <a href="javascript:history.back()" class="btn btn-light rounded-pill px-4 me-2">Zpět</a>
                        <button type="submit" class="btn btn-dark rounded-pill px-5 shadow-sm">Uložit klienta</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
