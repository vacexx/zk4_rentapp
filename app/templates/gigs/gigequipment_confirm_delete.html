{% extends 'base.html' %}

{% block title %}Odebrat techniku | ZK4 Production{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="alert alert-danger text-center shadow-sm rounded-4">
            <h3 class="mb-4">Opravdu odebrat položku "{{ equipment.equipment.name }}"?</h3>
        <form method="post">
            {% csrf_token %}
            <a href="{% url 'gig_detail' equipment.gig.id %}" class="btn btn-secondary rounded-pill px-4">Zrušit</a>
            <button type="submit" class="btn btn-danger rounded-pill px-4">Ano, odebrat</button>
        </form>
        </div>
    </div>
</div>
{% endblock %}
