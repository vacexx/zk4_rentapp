<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ZK4 Production{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body { background-color: #f8f9fa; }
        .hover-lift { transition: transform 0.2s ease-in-out, box-shadow 0.2s; }
        .hover-lift:hover { transform: translateY(-3px); box-shadow: 0 .5rem 1rem rgba(0,0,0,.15)!important; }
        
        /* --- STYL HLAVIČKY A LOGA --- */
        .zk4-header {
            background-color: #242424; /* Opravdu tmavě šedá/černá */
            border-bottom: 2px solid #8d30ff; /* Tenká modrá linka dole */
        }
        
        .zk4-logo-wrapper {
            display: inline-block;
            transition: transform 0.3s ease;
            text-decoration: none !important;
        }
        
        .zk4-logo-wrapper:hover {
            transform: scale(1.02); /* Jemné zvětšení při najetí myší */
        }

        .zk4-logo {
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            /* Stříbrno-bílý přechod na hlavní text */
            background: linear-gradient(45deg, #ffffff, #000000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .zk4-logo span {
            font-weight: 300; /* Tenčí řez písma pro slovo Production */
            letter-spacing: 5px;
            -webkit-text-fill-color: #8d30ff; /* Světle modrá (cyan) barva */
        }

        .zk4-logo i {
            -webkit-text-fill-color: #8d30ff; /* Tmavší modrá barva pro mikrofon */
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body class="pb-5">

    <header class="zk4-header mb-5 py-4 shadow-lg text-center">
        <div class="container d-flex justify-content-center">
            <a href="{% url 'gig_list' %}" class="zk4-logo-wrapper">
                <h1 class="zk4-logo">
                    <i class="bi bi-speaker me-2"></i>ZK4 <span>Production</span>
                </h1>
            </a>
        </div>
    </header>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}

</body>
</html>
